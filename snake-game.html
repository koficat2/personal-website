<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Christian Tyler | Snake Game</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrapper {
        text-align: center;
      }
      canvas {
        background: #111827;
        border: 2px solid #334155;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .meta {
        margin: 0.8rem 0;
      }
      button {
        padding: 0.6rem 1rem;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      a {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>Snake Game</h1>
      <p class="meta">Use arrow keys to move. Score: <span id="score">0</span></p>
      <canvas id="game" width="400" height="400" aria-label="Snake Game Canvas"></canvas>
      <p class="meta"><button id="restart">Restart Game</button></p>
      <p><a href="index.html">← Back to portfolio</a></p>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const restartButton = document.getElementById("restart");

      const gridSize = 20;
      const tileCount = canvas.width / gridSize;

      let snake;
      let direction;
      let food;
      let score;
      let gameOver;

      function randomPosition() {
        return Math.floor(Math.random() * tileCount);
      }

      function resetGame() {
        snake = [{ x: 10, y: 10 }];
        direction = { x: 1, y: 0 };
        food = { x: randomPosition(), y: randomPosition() };
        score = 0;
        gameOver = false;
        scoreElement.textContent = score;
      }

      function drawTile(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * gridSize, y * gridSize, gridSize - 2, gridSize - 2);
      }

      function loop() {
        if (gameOver) {
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#fff";
          ctx.font = "28px Inter";
          ctx.fillText("Game Over", 130, 190);
          ctx.font = "16px Inter";
          ctx.fillText("Press Restart", 148, 220);
          return;
        }

        const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
          gameOver = true;
        }

        if (snake.some((segment) => segment.x === head.x && segment.y === head.y)) {
          gameOver = true;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreElement.textContent = score;
          food = { x: randomPosition(), y: randomPosition() };
          while (snake.some((segment) => segment.x === food.x && segment.y === food.y)) {
            food = { x: randomPosition(), y: randomPosition() };
          }
        } else {
          snake.pop();
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawTile(food.x, food.y, "#ef4444");
        snake.forEach((segment, index) => drawTile(segment.x, segment.y, index === 0 ? "#22c55e" : "#16a34a"));
      }

      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp" && direction.y !== 1) direction = { x: 0, y: -1 };
        if (event.key === "ArrowDown" && direction.y !== -1) direction = { x: 0, y: 1 };
        if (event.key === "ArrowLeft" && direction.x !== 1) direction = { x: -1, y: 0 };
        if (event.key === "ArrowRight" && direction.x !== -1) direction = { x: 1, y: 0 };
      });

      restartButton.addEventListener("click", resetGame);

      resetGame();
      setInterval(loop, 100);
    </script>
  </body>
</html>
